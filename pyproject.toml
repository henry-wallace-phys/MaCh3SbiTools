[project]
name = "mach3sbitools"
version = "2.1.0"
description = "Specific SBI package for handling MaCh3 Chains"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "torch",
    "sbi",
    "uproot",
    "matplotlib",
    "ipython",
    "ipykernel",
    "ipywidgets",
    "click",
    "arrow",
    "click",
    "scipy-stubs~=1.17.1",
    "arviz",
    "pytest,"
    "pytest-cov",
]

[project.scripts]
mach3sbi = "mach3sbitools.apps.main_cli:cli"
