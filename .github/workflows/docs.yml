name: Build & Deploy Sphinx Docs

on:
  push

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + doc dependencies
        run: |
          pip install -e ".[dev]"
          pip install sphinx "sphinx-autodoc-typehints>=2.3.0" furo sphinx-click

      - name: Build HTML docs
        run: |
          sphinx-apidoc --force --module-first --separate \
            -o docs/source src/mach3sbitools
          sphinx-build -b html --keep-going docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4