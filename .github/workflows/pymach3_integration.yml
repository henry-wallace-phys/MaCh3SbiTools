---
name: pyMaCh3-integration
on:
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # You can test your matrix by printing the current Python version
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Clone MaCh3
        env:
          CMAKE_ARGS: "-DPYTHON_ENABLED=ON -DMaCh3_Branch=feature_python_bindings"
        run: |
          cd /opt/
          git clone --branch "feature_python_build" https://github.com/mach3-software/MaCh3Tutorial.git MaCh3Tutorial
          cd MaCh3Tutorial
          pip install .

      - name: Test with pytest
        env:
          MACH3: /opt/MaCh3Tutorial


        run: |
          cd /opt/MaCh3Tutorial
          pytest $GITHUB_WORKSPACE/MaCh3SbiTools --junitxml=junit/test-results.xml --cov=mach3sbitools --cov-report=xml --cov-report=term-missing
