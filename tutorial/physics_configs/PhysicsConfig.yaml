Sample:
  sample_config: "physics_configs/SampleConfig.yaml"

Parameters:
  - Parameter:
      # A flat parameter
      name: flat_param
      is_flat: true
      nominal: 1
      error: 0.5
      modes: [0, 1]
      bounds: [0, 5]
      energy_range: [2, 5]

  - Parameter:
      # Gaussian parameter 1
      name: gaussian_param_1
      is_flat: False
      nominal: 1
      error: 1
      modes: [0]
      bounds: [0, 10]
      correlations:
        gaussian_param_2: 0.5
      energy_range: [ 0, 10 ]

  - Parameter:
      # A correlated Gaussian parameter
      name: gaussian_param_2
      is_flat: False
      nominal: 1
      error: 0.5
      modes: [1]
      bounds: [0, 5]
      correlations:
        gaussian_param_1: 0.5
      energy_range: [ 0, 10 ]


  - Parameter:
      # This parameter will eventually be cyclical!
      name: cyclical_param
      is_flat: True
      cos_weight: True
      nominal: 1
      modes: [0, 1]
      error: 3.141
      bounds: [-3.1415926, 3.1415926]
      energy_range: [ 1, 9 ]
